version: 2.1

executors:
  executor-java:
    working_directory: /tmp/happy-hour-finder-server/
    docker:
      - image: circleci/openjdk:8-jdk
        environment:
          VERSION: 1.2.0-SNAPSHOT
          IMAGE_NAME: mathieuaime/happyhourfinder-server
          MAVEN_OPTS: -Xmx3200m
      - image: circleci/mysql
        environment:
          MYSQL_USER: root
          MYSQL_ROOT_PASSWORD: password
          MYSQL_DATABASE: happyhourfinder
  executor-buildpack:
    working_directory: /tmp/happy-hour-finder-server/backend
    docker:
      - image: buildpack-deps:stretch
jobs:

  integration_tests_back:
    executor: executor-java
    steps:
      - checkout:
          path: /tmp/happy-hour-finder-server
      - run:
          name: Integration tests
          command: mvn integration-test
      - run:
          name: Generate Code Coverage Report
          command: mvn org.jacoco:jacoco-maven-plugin:prepare-agent -Dmaven.test.failure.ignore=false
      - run:
          name: Run Code Quality Analysis
          command: mvn sonar:sonar -Dsonar.login=$SONAR_TOKEN -Dsonar.branch.name=${CIRCLE_BRANCH}
      - store_test_results:
          path: target/surefire-reports

  publish_back:
    executor: executor-java
    steps:
      - checkout:
          path: /tmp/happy-hour-finder-server
      - setup_remote_docker
      - run:
          name: Packaging
          command: mvn package -DskipTests
      - run:
          name: Build Docker Image
          command: docker build --build-arg JAR_FILE=daemon/target/happy-hour-finder-daemon-$VERSION.jar -t $IMAGE_NAME:$VERSION .
      - run:
          name: Push Docker Image
          command: |
            echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker push $IMAGE_NAME:$VERSION

  deploy_back:
    executor: executor-buildpack
    steps:
      - run:
          name: Deploying Back
          command: echo "Deploy !"


workflows:
  version: 2
  build:
    jobs:
      - integration_tests_back
      - publish_back:
          requires:
            - integration_tests_back
          filters:
            branches:
              only:
                - master
                - dev
      - deploy_back:
          requires:
            - publish_back
